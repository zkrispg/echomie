version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-echomie}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-echomie}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-echomie}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-echomie}:${DB_PASSWORD}@db:5432/${DB_NAME:-echomie}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      USE_REDIS_QUEUE: "1"
      REDIS_QUEUE_NAME: ai_tasks
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      BACKEND_BASE_URL: http://backend:8000
      STORAGE_BASE_PATH: /data/storage
      MAX_UPLOAD_SIZE_MB: "500"
      LOG_LEVEL: INFO
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: "1"
    volumes:
      - storage_data:/data/storage
    expose:
      - "8000"

  worker:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "worker.py"]
    environment:
      DATABASE_URL: postgresql://${DB_USER:-echomie}:${DB_PASSWORD}@db:5432/${DB_NAME:-echomie}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_QUEUE_NAME: ai_tasks
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      BACKEND_BASE_URL: http://backend:8000
      STORAGE_BASE_PATH: /data/storage
      LOG_LEVEL: INFO
    volumes:
      - storage_data:/data/storage

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  pgdata:
  redisdata:
  storage_data:
